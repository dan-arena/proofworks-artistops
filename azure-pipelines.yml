trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: 'Release'

steps:

- task: UseDotNet@2
  displayName: 'Install .NET SDK'
  inputs:
    packageType: 'sdk'
    version: '10.x'

- script: dotnet restore ./ProofWorks.ArtistOps.sln
  displayName: 'Restore NuGet Packages'

- script: dotnet build ./ProofWorks.ArtistOps.sln --configuration $(buildConfiguration) --no-restore
  displayName: 'Build Solution'